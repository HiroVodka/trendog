name: trendog

concurrency:
  group: trendog-prod
  cancel-in-progress: false

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "normal or force"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - force
      dryRun:
        description: "do not post to Slack"
        required: false
        default: false
        type: boolean
      maxTopics:
        description: "max topic count (<=30)"
        required: false
        default: "17"
      audienceProfile:
        description: "target audience profile for Gemini filtering"
        required: false
        default: "バックエンドエンジニア、SREエンジニア"
      debug:
        description: "debug logging"
        required: false
        default: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run batch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          AUDIENCE_PROFILE: ${{ vars.AUDIENCE_PROFILE }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATE_FILE_PATH: state/state.json
          INPUT_MODE: ${{ github.event.inputs.mode || 'normal' }}
          INPUT_DRYRUN: ${{ github.event.inputs.dryRun || 'false' }}
          INPUT_MAXTOPICS: ${{ github.event.inputs.maxTopics || '17' }}
          INPUT_AUDIENCEPROFILE: ${{ github.event.inputs.audienceProfile || 'バックエンドエンジニア、SREエンジニア' }}
          INPUT_DEBUG: ${{ github.event.inputs.debug || 'false' }}
        run: npm run run

      - name: Commit state
        if: ${{ success() && (github.event.inputs.dryRun != 'true') }}
        run: |
          if [ -f state/state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/state.json
            git commit -m "chore: update trendog state [skip ci]" || true
            git push
          fi
